<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Rating UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="rating-card">
        <div class="emoji-container" id="emoji-display">😠</div>
        
        <div class="stars">
            <i class="fa-solid fa-star" data-index="1"></i>
            <i class="fa-solid fa-star" data-index="2"></i>
            <i class="fa-solid fa-star" data-index="3"></i>
            <i class="fa-solid fa-star" data-index="4"></i>
            <i class="fa-solid fa-star" data-index="5"></i>
        </div>

        <div class="footer">
            <span>Rate your experience</span>
            <span id="rating-text">0 out of 5</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
